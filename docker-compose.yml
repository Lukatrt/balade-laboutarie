version: '3.8'

services:
  balade-laboutarie:
    build: .
    container_name: balade-laboutarie
    restart: unless-stopped
    ports:
      - "9876:3000"
    environment:
      - PORT=3000
      - ORS_KEY=${ORS_KEY}
    volumes:
      # Optional: mount a directory if you want persistent file caching later. 
      # Currently using in-memory LRU cache which clears on restart.
      - balade-cache:/app/backend/cache
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  balade-cache:
